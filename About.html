<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="style2.css">
   
</head>

<body>
    <link rel="stylesheet" href="about.css">
    <div id="wrapper">
        <div id="header">
            <nav class="container">
                <a href="lab1.html">Lab1</a>
                <a href="">Lab2</a>
                <a href="">Lab3</a>
                <a href="">Lab4</a>
                <a href="About.html">About</a>
                <a href="Home.html">Home</a>
            </nav>
        </div>

        <div class="myCV">
            <h1>About Me IRL</h1>
            

            <nav class="img-displayer">
                <img src="about.png" alt="My CV"  onclick="openModal(this)">
                <img src="Trip.jpg" alt="Trip 1" onclick="openModal(this)">
                <img src="Trip2.jpg" alt="Trip 2" onclick="openModal(this)">
                <img src="Trip3.jpg" alt="Trip 3" onclick="openModal(this)">
                <img src="Trip4.jpg" alt="Trip 4" onclick="openModal(this)">
                <img src="Trip5.jpg" alt="Trip 5" onclick="openModal(this)">
                <img src="School.jpg" alt="" onclick="openModal(this)">
                <img src="School1.jpg" alt=""onclick="openModal(this)">
                <img src="School2.jpg" alt=""onclick="openModal(this)">

            </nav>
        </div>

        <!-- Modal for displaying full-size images -->
        <div id="myModal" class="modal">
            <span class="close" onclick="closeModal()">&times;</span>
            <img class="modal-content" id="img01">
        </div>
    </div>

    <script>
        function openModal(img) {
            const modal = document.getElementById("myModal");
            const modalImg = document.getElementById("img01");
            modal.style.display = "flex";
            modalImg.src = img.src;
        }

        function closeModal() {
            const modal = document.getElementById("myModal");
            modal.style.display = "none";
        }
    </script>
</body>

</html>
